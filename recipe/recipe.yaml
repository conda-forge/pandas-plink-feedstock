schema_version: 1

context:
  version: 2.3.2

package:
  name: pandas-plink
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pandas-plink/pandas_plink-${{ version }}.tar.gz
  sha256: f43feeb2d974c156cb567807c0d38f66bc6e5b4358d333f1029422adf105df90

build:
  number: 1
  script: ${{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: build_platform != target_platform
      then: 
        - cffi >=1.14.3
        - python
        - cross-python_${{ target_platform }}
  host:
    - python
    - pip
    - poetry-core
    - cffi >=1.14.3
  run:
    - Deprecated >=1.2.6
    - cffi >=1.14.3
    - dask >=2.6.0
    - numpy >=1.17.2,<2.0
    - pandas >=1.1.3
    - pandera-base
    - pytest >=5.2.2
    - python
    - tqdm >=4.36.1
    - xarray >=0.18.2
    - zstandard >=0.13.0,<0.25

tests:
  - python:
      imports:
        - pandas
        - pandas_plink

about:
  license: MIT
  license_file: LICENSE.md
  summary: Convert PLINK files to data array
  homepage: https://github.com/limix/pandas-plink
  repository: https://github.com/limix/pandas-plink
  documentation: https://pandas-plink.readthedocs.io

extra:
  recipe-maintainers:
    - danielnachun
    - Horta
